*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif}
body{background:#000;color:#fff;overflow:hidden}
.loader{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:9999;font-size:32px;transition:1s}
.loader.hide{opacity:0;pointer-events:none}

.hero{height:100vh;position:relative;overflow:hidden}

.overlay{position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.82),rgba(0,0,0,.25))}

position:absolute;top:70px;left:30px;right:30px;

z-index:100;

.cta{display:flex;gap:12px;margin-top:24px}
.btn{padding:14px 22px;border:none;border-radius:12px;cursor:pointer}

.stats{
position:absolute;left:60px;bottom:40px;display:flex;gap:12px;z-index:80

.progress{display:none;}
.bar{width:220px;height:4px;background:rgba(255,255,255,.15)}
.fill{height:100%;background:#fff;width:10%;transition:.6s}

.previews{

.strip,.mainrow{display:flex;gap:8px}

.thumb{
overflow:hidden;border-radius:12px;cursor:pointer;
border:2px solid rgba(255,255,255,.25);

.thumb:hover img{transform:scale(1.08)}
.small{height:56px;flex:1}

.scroll{position:absolute;bottom:15px;left:50%;transform:translateX(-50%);z-index:80}

position:fixed;
display:none;
overflow:hidden;
border-radius:16px;
pointer-events:none;
z-index:50; /* under content/navbar */

<script>
const slides=[
["Mirror Lake","Stillness in the alpine wild.","https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=2000"],
["Mountain Peak","Touch the clouds above.","https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=2000"],
["Deep Forest","Walk through nature.","https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=2000"],
["Golden Desert","Beauty beyond the horizon.","https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=2000"],
["Ocean Dream","Where sea meets sky.","https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=2000"],
["Snow Valley","A peaceful winter scene.","https://images.unsplash.com/photo-1511497584788-876760111969?w=2000"],
["River View","Flowing through mountains.","https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=2000"],
["Green Hills","Endless natural beauty.","https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=2000"],
["Wild Nature","Untouched landscapes.","https://images.unsplash.com/photo-1500375592092-40eb2168fd21?w=2000"],
["Blue Horizon","Adventure awaits.","https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=2000"]
];

let current=0;
const bg=document.getElementById('bg');
const title=document.getElementById('title');
const desc=document.getElementById('desc');
const strip=document.getElementById('strip');
const mainrow=document.getElementById('mainrow');
const clone=document.getElementById('transitionClone');

function render(){
const s=slides[current];
bg.style.backgroundImage=`url(${s[2]})`;
title.textContent=s[0];
desc.textContent=s[1];
title.className='textAnim';
desc.className='textAnim';
counter.textContent=String(current+1).padStart(2,'0')+' / '+slides.length;
fill.style.width=((current+1)/slides.length*100)+'%';
const gc=document.getElementById('galleryCounter');
const gf=document.getElementById('galleryFill');
if(gc) gc.textContent=counter.textContent;
if(gf) gf.style.width=fill.style.width;

mainrow.innerHTML='';
strip.innerHTML='';

for(let i=1;i<=2;i++){
let idx=(current+i)%slides.length;
mainrow.innerHTML += `<div class="thumb big" data-i="${idx}"><img src="${slides[idx][2]}"></div>`;
}
for(let i=3;i<slides.length;i++){
let idx=(current+i)%slides.length;
strip.innerHTML += `<div class="thumb small" data-i="${idx}"><img src="${slides[idx][2]}"></div>`;
}

document.querySelectorAll('.thumb').forEach(t=>{
t.onclick=()=>animateTo(+t.dataset.i,t);
});
}

function animateTo(index,el){
const img=slides[index][2];
const r=el.getBoundingClientRect();

clone.innerHTML=`<img src="${img}">`;
clone.style.display='block';
clone.style.left=r.left+'px';
clone.style.top=r.top+'px';
clone.style.width=r.width+'px';
clone.style.height=r.height+'px';
clone.style.opacity='1';

requestAnimationFrame(()=>{
clone.style.transition='all .55s cubic-bezier(.22,1,.36,1)';
clone.style.left=(innerWidth/2-220)+'px';
clone.style.top=(innerHeight/2-140)+'px';
clone.style.width='440px';
clone.style.height='280px';

setTimeout(()=>{
clone.style.transition='all .8s cubic-bezier(.22,1,.36,1)';
clone.style.left='0';
clone.style.top='0';
clone.style.width='100vw';
clone.style.height='100vh';
clone.style.borderRadius='0';
},550);
});

setTimeout(()=>{
current=index;
render();
},900);

setTimeout(()=>{
clone.style.opacity='0';
},1200);

setTimeout(()=>{
clone.style.display='none';
},1600);
}

render();

setInterval(()=>{
current=(current+1)%slides.length;
render();
},7000);

setTimeout(()=>loader.classList.add('hide'),1200);

document.addEventListener('mousemove',e=>{
const x=(e.clientX/innerWidth-.5)*8;
const y=(e.clientY/innerHeight-.5)*8;
bg.style.transform=`scale(1.05) translate(${x}px,${y}px)`;
});
</script>

<script>
function toggleDrawer(){
 document.getElementById('mobileDrawer').classList.toggle('open');
 document.getElementById('drawerOverlay').classList.toggle('show');
}
</script>

<script>
function handleMobileTopbar(){
  const topbar=document.querySelector('.topbar');
  const nav=document.querySelector('.nav');
  if(!topbar || !nav) return;

  if(window.innerWidth <= 768){
    let lastY=0;
    window.addEventListener('scroll',()=>{
      const y=window.scrollY;
      if(y>50){
        topbar.style.transform='translateY(-100%)';
        topbar.style.opacity='0';
        nav.style.top='10px';
      }else{
        topbar.style.transform='translateY(0)';
        topbar.style.opacity='1';
        nav.style.top='70px';
      }
      lastY=y;
    });
  }
}
handleMobileTopbar();
</script>
